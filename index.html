<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shay Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function(){
      var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="nav-logo" id="nav-logo">Shay Design</a>
      <span class="nav-breadcrumb" id="nav-breadcrumb"></span>
    </div>
  </nav>

  <main id="app"></main>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Media viewer">
    <button id="lightbox-close" class="lb-close" aria-label="Close">&times;</button>
    <button id="lightbox-prev" class="lb-nav lb-prev" aria-label="Previous">&#8592;</button>
    <button id="lightbox-next" class="lb-nav lb-next" aria-label="Next">&#8594;</button>
    <div id="lightbox-media" class="lb-media"></div>
    <div class="lb-footer">
      <span id="lightbox-label" class="lb-label"></span>
      <span id="lightbox-counter" class="lb-counter"></span>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-name" id="footer-name">Shay Design</span>
      <div id="footer-social" class="footer-social"></div>
      <div id="footer-email" class="footer-email"></div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
