<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shay Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
<!-- OG:START -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Shay Design">
  <meta property="og:description" content="Graphic &amp; Print Design | Video Editing | Motion Design">
  <meta property="og:image" content="https://shay.design/Assets/share.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shay Design">
  <meta name="twitter:description" content="Graphic &amp; Print Design | Video Editing | Motion Design">
  <meta name="twitter:image" content="https://shay.design/Assets/share.png">
  <!-- OG:END -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="nav-logo" id="nav-logo">Shay Design</a>
      <span class="nav-breadcrumb" id="nav-breadcrumb"></span>
      <div id="nav-social" class="nav-social"></div>
    </div>
  </nav>

  <main id="app"></main>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Media viewer">
    <button id="lightbox-close" class="lb-close" aria-label="Close">&times;</button>
    <button id="lightbox-prev" class="lb-nav lb-prev" aria-label="Previous">&#8592;</button>
    <button id="lightbox-next" class="lb-nav lb-next" aria-label="Next">&#8594;</button>
    <div id="lightbox-media" class="lb-media"></div>
    <div class="lb-footer">
      <span id="lightbox-label" class="lb-label"></span>
      <span id="lightbox-counter" class="lb-counter"></span>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div id="footer-social" class="footer-social"></div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
