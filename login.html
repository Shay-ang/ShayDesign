<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shay Design — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAFAFA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 3rem 2.5rem;
      background: #fff;
      border: 1px solid #E8E8E8;
      text-align: center;
    }

    .logo {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 2rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 0.95rem;
      border: 1px solid #E8E8E8;
      outline: none;
      background: #FAFAFA;
      color: #111;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input[type="password"]:focus { border-color: #111; background: #fff; }

    button {
      width: 100%;
      padding: 10px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s;
    }

    button:hover { background: #333; }

    .error {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #c0392b;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Shay Design</p>
    <p class="subtitle">Admin Access</p>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password">
      <button type="submit">Enter</button>
    </form>
    <script>
      if (location.search.includes('error=1')) {
        var p = document.createElement('p');
        p.className = 'error';
        p.textContent = 'Incorrect password.';
        document.querySelector('form').after(p);
      }
    </script>
  </div>
</body>
</html>
